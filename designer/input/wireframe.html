<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Wireframe — Login Page</title>
<style>
  body { font-family: sans-serif; background: #fff; color: #333; max-width: 1200px; margin: 0 auto; padding: 24px; }
  .screen { border: 2px solid #ccc; border-radius: 8px; padding: 24px; margin-bottom: 32px; }
  .screen h2 { color: #666; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
  .placeholder { background: #e0e0e0; border-radius: 4px; padding: 16px; margin: 8px 0; color: #666; }
  .annotation { font-size: 12px; color: #999; font-style: italic; margin-top: 4px; }
</style>
</head>
<body>
  <h1>Wireframe — Login Page</h1>
  <div class="screen">
    <h2>Экран: Логин</h2>
    <div style="max-width:400px;margin:0 auto;text-align:center">
      <div class="placeholder" style="width:80px;height:80px;margin:0 auto 24px;border-radius:50%">Logo</div>
      <div class="annotation">Логотип приложения</div>
      <div class="placeholder" style="height:44px;margin-top:24px">Email input</div>
      <div class="annotation">Поле ввода email</div>
      <div class="placeholder" style="height:44px">Password input</div>
      <div class="annotation">Поле ввода пароля</div>
      <div class="placeholder" style="height:44px;background:#666;color:#fff">Войти</div>
      <div class="annotation">Кнопка входа</div>
      <div class="placeholder" style="height:20px;background:transparent;color:#999">Забыли пароль?</div>
    </div>
  </div>
</body>
</html>
