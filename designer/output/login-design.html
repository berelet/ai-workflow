<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Design</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  <div class="w-[400px] bg-white rounded-2xl shadow-lg p-10">
    <div class="flex justify-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 text-center mb-2">Welcome Back</h1>
    <p class="text-gray-500 text-center text-sm mb-8">Sign in to your account</p>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-600"><input type="checkbox" class="rounded"> Remember me</label>
        <a href="#" class="text-blue-600 hover:text-blue-700">Forgot password?</a>
      </div>
      <button class="w-full py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-semibold rounded-lg hover:opacity-90 transition">Sign In</button>
    </div>
    <p class="text-center text-sm text-gray-500 mt-6">Don't have an account? <a href="#" class="text-blue-600 font-medium">Sign up</a></p>
  </div>
</body>
</html>
